<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Gallery
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Gallery</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- CHANGE: Add a grid component to display the photos -->
  <ion-grid>

    <ion-row>
      <!-- CHANGE: Create a new column and image component for each photo -->
      <ion-col size="6" size-md="4" *ngFor="let photo of photoService.photos">
        <ion-img [src]="photo.webviewPath"></ion-img>
      </ion-col>
    </ion-row>

  </ion-grid>
  
</ion-content>
